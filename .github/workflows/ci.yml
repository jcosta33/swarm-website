name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Serve built site
        run: |
          npx serve dist -l 3000 --no-request-logging &
          sleep 3

      - name: Check internal links
        run: npx linkinator http://127.0.0.1:3000 --skip "^https://github.com" --skip "^https://suspecframework.dev"

      - name: Accessibility audit (home + docs)
        run: npx axe http://127.0.0.1:3000 http://127.0.0.1:3000/docs/ http://127.0.0.1:3000/docs/01-what-is-suspec/ --exit

      - name: Lighthouse audit (home + docs)
        run: |
          npx lighthouse http://127.0.0.1:3000 --output=json --output-path=./lighthouse-home.json --chrome-flags="--headless --no-sandbox" --preset=desktop --only-categories=performance,accessibility,best-practices,seo
          npx lighthouse http://127.0.0.1:3000/docs/01-what-is-suspec/ --output=json --output-path=./lighthouse-docs.json --chrome-flags="--headless --no-sandbox" --preset=desktop --only-categories=performance,accessibility,best-practices,seo

      - name: Check Lighthouse thresholds (home + docs)
        run: |
          node -e "
            const fs = require('fs');
            const reports = ['./lighthouse-home.json', './lighthouse-docs.json'];
            const thresholds = { performance: 0.90, accessibility: 0.95, 'best-practices': 0.90, seo: 0.90 };
            let failed = false;
            for (const path of reports) {
              if (!fs.existsSync(path)) {
                console.error(path + ' not found; threshold check cannot run.');
                process.exit(1);
              }
              const report = require(path);
              console.log('== ' + path + ' ==');
              for (const key of Object.keys(thresholds)) {
                const value = report.categories[key].score;
                console.log('  ' + key + ': ' + Math.round(value * 100));
                if (value < thresholds[key]) {
                  console.error('  FAIL: ' + key + ' below threshold ' + Math.round(thresholds[key] * 100));
                  failed = true;
                }
              }
            }
            if (failed) process.exit(1);
          "

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: ./lighthouse-*.json
          if-no-files-found: ignore
