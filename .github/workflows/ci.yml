name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Serve built site
        run: |
          npx serve dist -l 3000 --no-request-logging &
          sleep 3

      - name: Check internal links
        run: npx linkinator http://127.0.0.1:3000 --skip "^https://github.com" --skip "^https://swarmframework.dev"

      - name: Accessibility audit
        run: npx axe http://127.0.0.1:3000 --exit

      - name: Lighthouse audit
        run: npx lighthouse http://127.0.0.1:3000 --output=json --output-path=./lighthouse.json --chrome-flags="--headless --no-sandbox" --preset=desktop --only-categories=performance,accessibility,best-practices,seo

      - name: Check Lighthouse thresholds
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('./lighthouse.json')) {
              console.error('Lighthouse report not found; threshold check cannot run.');
              process.exit(1);
            }
            const report = require('./lighthouse.json');
            const scores = {
              performance: report.categories.performance.score,
              accessibility: report.categories.accessibility.score,
              bestPractices: report.categories['best-practices'].score,
              seo: report.categories.seo.score,
            };
            const thresholds = { performance: 0.90, accessibility: 0.95, bestPractices: 0.90, seo: 0.90 };
            let failed = false;
            for (const [key, value] of Object.entries(scores)) {
              const label = key === 'bestPractices' ? 'best-practices' : key;
              console.log(\`\${label}: \${Math.round(value * 100)}\`);
              if (value < thresholds[key]) {
                console.error(\`FAIL: \${label} below threshold \${Math.round(thresholds[key] * 100)}\`);
                failed = true;
              }
            }
            if (failed) process.exit(1);
          "

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: ./lighthouse.json
          if-no-files-found: ignore
